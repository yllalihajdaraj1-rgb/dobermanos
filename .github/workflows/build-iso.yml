name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Doberman ISO
        run: |
          # We are going to build this inside a super-privileged container
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso
            
            # 1. Create a clean workspace
            mkdir -p /tmp/build_profile
            cp -r /usr/share/archiso/configs/releng/* /tmp/build_profile/
            
            # 2. Add a basic package list so the engine starts
            echo 'base linux linux-firmware networkmanager nano sudo' > /tmp/build_profile/packages.x86_64
            
            # 3. Inject YOUR scripts into the ISO's root folder
            mkdir -p /tmp/build_profile/airootfs/root/scripts
            cp -r Archiv/* /tmp/build_profile/airootfs/root/scripts/ || true
            
            # 4. FIX PERMISSIONS (This is why it was failing!)
            find /tmp/build_profile -type d -exec chmod 755 {} +
            find /tmp/build_profile -type f -exec chmod 644 {} +
            chmod +x /tmp/build_profile/profiledef.sh
            
            # 5. START THE ENGINE
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace /tmp/build_profile
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Final-ISO
          path: ./*.iso

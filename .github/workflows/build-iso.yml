name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Doberman ISO
        run: |
          # We use Docker because it got the furthest (Line 270!)
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso
            
            # This line is the magic. It searches for the folder with the recipe.
            TARGET_DIR=\$(find . -name profiledef.sh -printf '%h' | head -n 1)
            
            echo \"Starting build in: \$TARGET_DIR\"
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace \$TARGET_DIR
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: ./*.iso

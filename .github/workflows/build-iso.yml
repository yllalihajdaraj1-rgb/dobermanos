name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Doberman ISO
        run: |
          sudo apt update
          sudo apt install -y arch-install-scripts
          
          # Give the script permission to run
          chmod +x Archiv/create-arch-iso.sh
          
          # Run the specific script from your project
          sudo ./Archiv/create-arch-iso.sh
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: ./*.iso

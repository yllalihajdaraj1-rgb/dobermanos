name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Doberman ISO
        run: |
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso git
            
            # This searches for the recipe file automatically
            PROFILE_PATH=\$(find . -name profiledef.sh -printf '%h' | head -n 1)
            
            echo \"Building from folder: \$PROFILE_PATH\"
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace \$PROFILE_PATH
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: ./*.iso

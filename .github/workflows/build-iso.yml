name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build in Arch Container
        run: |
          # Launching the Arch Linux environment
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace/Archiv archlinux:latest /bin/bash -c "
            # Install necessary tools
            pacman -Syu --noconfirm archiso mkinitcpio squashfs-tools libisoburn dosfstools patch
            
            # Make sure the script is executable
            chmod +x create-arch-iso.sh
            
            # RUN THE BUILD
            ./create-arch-iso.sh
          "
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: "**/*.iso"

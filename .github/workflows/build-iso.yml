name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Doberman ISO
        run: |
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso
            
            # 1. Grab the official 'Releng' recipe (the gold standard)
            cp -r /usr/share/archiso/configs/releng/ /tmp/build_profile
            
            # 2. Merge YOUR files from 'Archiv' into the official recipe
            # This keeps the important stuff but fixes the missing pieces
            cp -r Archiv/* /tmp/build_profile/ || true
            
            # 3. Start the build
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace /tmp/build_profile
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: ./*.iso

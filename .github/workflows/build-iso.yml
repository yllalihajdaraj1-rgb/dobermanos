name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build in Arch Container
        run: |
          # This creates a "mini-computer" inside GitHub that already knows Arch Linux
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso mkinitcpio squashfs-tools libisoburn
            
            # Find the script and make it runnable
            chmod +x Archiv/create-arch-iso.sh
            
            # Go into the folder and run it
            cd Archiv && ./create-arch-iso.sh
          "
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: "**/*.iso"

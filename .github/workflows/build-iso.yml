name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Doberman ISO
        run: |
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            # 1. Install EVERYTHING needed
            pacman -Syu --noconfirm archiso mkinitcpio squashfs-tools libisoburn dosfstools patch binutils
            
            # 2. Setup the Official Base
            cp -r /usr/share/archiso/configs/releng/ /tmp/build_profile
            
            # 3. Force your Archiv files into the profile
            # This makes sure the robot sees YOUR work
            cp -rv Archiv/* /tmp/build_profile/ || true
            
            # 4. Final Permission Sweep
            chmod +x /tmp/build_profile/profiledef.sh || true
            
            # 5. BUILD
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace /tmp/build_profile
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: ./*.iso

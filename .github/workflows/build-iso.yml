name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Doberman ISO
        run: |
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso
            
            # 1. Look for the recipe folder
            PROFILE_DIR=\$(find . -name profiledef.sh -printf '%h' | head -n 1)
            
            # 2. If it's missing, try to find the folder that SHOULD have it
            if [ -z \"\$PROFILE_DIR\" ]; then
              PROFILE_DIR=\"./Archiv\"
            fi
            
            echo \"Attempting build in: \$PROFILE_DIR\"
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace \"\$PROFILE_DIR\"
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: ./*.iso

name: Build ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y arch-install-scripts
          
      - name: Build Doberman ISO
        run: |
          # This runs the build with extra permissions
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso git
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace .
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DobermanOS-Arch-ISO
          path: ./*.iso- name: Build Doberman ISO
        run: |
          sudo docker run --privileged -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm archiso git
            # We added '/Archiv' below so it finds the files!
            mkarchiso -v -w /tmp/archiso-workspace -o /workspace ./Archiv
          "
